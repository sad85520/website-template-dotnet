# 複製此檔案為 secret.yml 並填入 base64 編碼的值
# 使用: echo -n "your-value" | base64
# secret.yml 已加入 .gitignore
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: web-template
type: Opaque
data:
  DB_PASSWORD: ""       # base64 encoded
  JWT_SECRET: ""        # base64 encoded
  DB_CONNECTION: ""     # base64 encoded connection string
