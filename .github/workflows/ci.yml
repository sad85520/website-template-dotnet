name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  frontend-ci:
    name: Frontend (Vue 3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: src/frontend/pnpm-lock.yaml

      # Run `pnpm install` locally first to generate pnpm-lock.yaml, then commit it.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

  backend-ci:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore WebTemplate.sln

      - name: Format check
        run: dotnet format WebTemplate.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build WebTemplate.sln --no-restore -c Release

      - name: Test with coverage
        run: dotnet test WebTemplate.sln --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          directory: src/backend/TestResults
        continue-on-error: true

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 防止範本佔位符 (__REPLACE_WITH_*__) 被誤提交為真實設定值。fail-fast 已在 runtime 擋下，
      # 但 CI 層額外掃描可在 PR 階段就阻擋，避免部署流程跑到一半才報錯。
      # Pattern 只配對「實際佔位值」（前後 __ 包住、全大寫），避免誤中：
      #   - 引用型程式碼（如 ServiceCollectionExtensions 的 Contains("__REPLACE_WITH_") fail-fast）
      #   - 說明文件裡描述佔位符格式的段落
      # 排除 .example / docs / 本 workflow，讓樣板檔可以合法包含佔位值。
      - name: Scan for unresolved __REPLACE_WITH_ placeholders
        run: |
          if git grep -nE "__REPLACE_WITH_[A-Z0-9_]+__" -- \
              ':!*.example' \
              ':!docs/**' \
              ':!.github/workflows/ci.yml' \
              ':!.env.example'; then
            echo "::error::Unresolved __REPLACE_WITH_*__ placeholder found in tracked files."
            exit 1
          fi

  k8s-lint:
    name: K8S Manifest Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate K8S manifests (dry-run)
        run: |
          for file in infra/k8s/**/*.yml infra/k8s/*.yml; do
            echo "Validating $file..."
            kubectl apply --dry-run=client -f "$file" 2>/dev/null || echo "Skipped: $file (needs cluster context)"
          done
        continue-on-error: true
