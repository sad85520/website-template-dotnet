name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # 每週掃描一次，涵蓋 push/PR 未觸發但依賴的 CVE 資料庫本身有更新的情境。
    - cron: "0 3 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # security-events: write 是 CodeQL 上傳掃描結果到 GitHub Security 頁籤的最低需求；
      # actions: read 是 private repo 上傳結果時查詢 workflow run 資訊所需
      # （缺少會在 Perform CodeQL Analysis 階段以 Resource not accessible by integration 失敗）；
      # 其餘權限維持預設最小化，與本 repo 其餘 workflow 的最小權限慣例一致。
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        # csharp 涵蓋 src/backend；javascript-typescript 涵蓋 src/frontend。
        language: ["csharp", "javascript-typescript"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        if: matrix.language == 'csharp'
        with:
          dotnet-version: "10.0.x"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
        with:
          languages: ${{ matrix.language }}

      - name: Build backend
        if: matrix.language == 'csharp'
        working-directory: src/backend
        run: dotnet build WebTemplate.sln -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v3
        with:
          category: "/language:${{ matrix.language }}"
